server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: let the client-side router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
