name: HairIQ PR Checks

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Backend ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: |
          cd services/backend
          uv export --no-dev --frozen > requirements.txt
          pip install -r requirements.txt

      - name: Run Django checks
        run: |
          cd services/backend
          python manage.py check --settings=core.settings
        env:
          DJANGO_DEBUG: "True"
          DJANGO_SECRET_KEY: ci-test-secret-key
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          DJANGO_ALLOWED_HOSTS: "localhost"

      # ─── Docker Validation ────────────────────────────────────────
      - name: Validate backend Dockerfile
        run: |
          docker build \
            --no-cache \
            --target builder \
            -f services/backend/Dockerfile \
            ./services/backend

      - name: Validate AI Dockerfile
        run: |
          docker build \
            --no-cache \
            --target builder \
            -f services/ai/Dockerfile \
            ./services/ai

      # ─── Docker Compose Validation ────────────────────────────────
      - name: Validate production Docker Compose configuration
        run: |
          docker compose \
            -f deployment/compose/docker-compose.base.yml \
            -f deployment/compose/production/docker-compose.yml \
            config --quiet

      - name: Validate staging Docker Compose configuration
        run: |
          docker compose \
            -f deployment/compose/docker-compose.base.yml \
            -f deployment/compose/staging/docker-compose.yml \
            config --quiet

      - name: Validate local Docker Compose configuration
        run: |
          docker compose \
            -f deployment/compose/docker-compose.base.yml \
            -f deployment/compose/local/docker-compose.yml \
            config --quiet

      - name: Validate production Compose service names
        shell: bash
        run: |
          set -euo pipefail

          services="$(
            docker compose \
              -f deployment/compose/docker-compose.base.yml \
              -f deployment/compose/production/docker-compose.yml \
              config --services
          )"

          echo "Detected production Compose services:"
          echo "$services"

          for required_service in backend ai admin landing; do
            if ! grep -qx "$required_service" <<< "$services"; then
              echo "Missing required Compose service: $required_service" >&2
              exit 1
            fi
          done

      # ─── Terraform Validation ─────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: Terraform Validate production
        run: |
          cd infrastructure/terraform/environments/production
          terraform init -backend=false
          terraform validate