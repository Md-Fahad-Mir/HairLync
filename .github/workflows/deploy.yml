name: HairIQ CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

# OIDC: lets this workflow request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  IMAGE_TAG: ${{ github.sha }}
  PRODUCTION_BRANCH: refs/heads/main
  ECR_REPOSITORIES: hairiq-backend hairiq-ai hairiq-landing hairiq-admin

jobs:
  # ─── Build & Push to ECR ────────────────────────────────────────────
  build:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate production deployment inputs
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "${PRODUCTION_BRANCH}" ]; then
            echo "::error::Production deploys must run from ${PRODUCTION_BRANCH}; got ${GITHUB_REF}."
            exit 1
          fi

          if [ -z "${AWS_ROLE_ARN}" ]; then
            echo "::error::GitHub secret AWS_ROLE_ARN is not configured."
            exit 1
          fi

          if ! printf '%s' "${AWS_ROLE_ARN}" | grep -Eq '^arn:aws:iam::[0-9]{12}:role/.+'; then
            echo "::error::GitHub secret AWS_ROLE_ARN must be an IAM role ARN."
            exit 1
          fi

          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "Expected OIDC subject: repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}"
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: hairiq-prod-build-${{ github.run_id }}
          retry-max-attempts: 3

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate ECR repositories
        run: |
          set -euo pipefail
          for repo in ${ECR_REPOSITORIES}; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null
            echo "Found ECR repository: $repo"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai
          file: ./services/ai/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-ai:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push landing page
        uses: docker/build-push-action@v5
        with:
          context: ./services/landing
          file: ./services/landing/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-landing:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/admin
          file: ./services/admin/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-admin:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-admin:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Production (via SSM — no inbound SSH) ────────────────
  deploy:
    name: Deploy to Production via SSM
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: hairiq-prod-deploy-${{ github.run_id }}
          retry-max-attempts: 3

      - name: Deploy on the instance via SSM Run Command
        run: |
          set -euo pipefail
          REGISTRY='${{ needs.build.outputs.registry }}'
          TAG='${{ github.sha }}'

          # Resolve the running production instance by tag.
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=hairiq-production" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running EC2 instance found with tag Name=hairiq-production."
            exit 1
          fi
          echo "Target instance: $INSTANCE_ID"

          # Tell SSM to run the on-box deploy script as the ubuntu user.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "HairIQ deploy $TAG" \
            --parameters "commands=sudo -u ubuntu env REGISTRY=$REGISTRY IMAGE_TAG=$TAG AWS_REGION=${{ env.AWS_REGION }} bash /home/ubuntu/hairiq/server-deploy.sh" \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"

          # Wait for completion and keep the final status visible even on failure.
          for attempt in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text 2>/dev/null || true)

            case "$STATUS" in
              Success|Cancelled|Failed|TimedOut|Cancelling)
                break
                ;;
              *)
                echo "Deploy status check $attempt/60: ${STATUS:-Pending}"
                sleep 10
                ;;
            esac
          done

          echo "::group::Deploy stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "::endgroup::"
          echo "::group::Deploy stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "::endgroup::"

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "Deploy status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "::group::Remote backend diagnostics"
            DIAG_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "HairIQ deploy diagnostics $TAG" \
              --parameters "commands=sudo -u ubuntu env REGISTRY=$REGISTRY IMAGE_TAG=$TAG bash -lc 'cd /home/ubuntu/hairiq && docker compose -f deployment/compose/docker-compose.base.yml -f deployment/compose/production/docker-compose.yml ps && docker compose -f deployment/compose/docker-compose.base.yml -f deployment/compose/production/docker-compose.yml logs --tail=200 backend'" \
              --query Command.CommandId --output text)

            for attempt in $(seq 1 12); do
              DIAG_STATUS=$(aws ssm get-command-invocation \
                --command-id "$DIAG_ID" \
                --instance-id "$INSTANCE_ID" \
                --query Status \
                --output text 2>/dev/null || true)

              case "$DIAG_STATUS" in
                Success|Cancelled|Failed|TimedOut|Cancelling)
                  break
                  ;;
                *)
                  sleep 5
                  ;;
              esac
            done

            aws ssm get-command-invocation --command-id "$DIAG_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
            aws ssm get-command-invocation --command-id "$DIAG_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
            echo "::endgroup::"
            exit 1
          fi
