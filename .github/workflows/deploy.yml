name: HairIQ CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# OIDC: lets this workflow request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build & Push to ECR ────────────────────────────────────────────
  build:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai
          file: ./services/ai/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-ai:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push landing page
        uses: docker/build-push-action@v5
        with:
          context: ./services/landing
          file: ./services/landing/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-landing:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/admin
          file: ./services/admin/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hairiq-admin:latest
            ${{ steps.login-ecr.outputs.registry }}/hairiq-admin:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Production ───────────────────────────────────────────
  deploy:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu/hairiq
            export PATH=$PATH:/usr/local/bin
            export REGISTRY='${{ needs.build.outputs.registry }}'
            export IMAGE_TAG='${{ github.sha }}'

            # Authenticate Docker to ECR using the EC2 instance profile (no keys).
            aws ecr get-login-password --region eu-north-1 \
              | docker login --username AWS --password-stdin "$REGISTRY"

            COMPOSE="docker compose \
              -f deployment/compose/docker-compose.base.yml \
              -f deployment/compose/production/docker-compose.yml"

            # Free disk from old layers before pulling new ones.
            docker system prune -af --filter "until=24h"

            # Pull the images built for THIS commit, then recreate containers.
            $COMPOSE pull
            $COMPOSE up -d --force-recreate --remove-orphans

            # Run migrations as a single controlled step (idempotent).
            $COMPOSE exec -T backend python manage.py migrate --noinput

            sleep 10
            $COMPOSE ps
