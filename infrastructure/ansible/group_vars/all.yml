# ─── HairIQ Global Variables ──────────────────────────────────────────
# Values shared across all environments. Override in <env>.yml files.

project_name: "{{ lookup('env', 'PROJECT_NAME') | default('hairiq') }}"
project_path: "/home/ubuntu/{{ project_name }}"
website_domain: "hairiq.io"
certbot_email: "hairlyncapp@gmail.com"

# Docker Compose file on the remote server
docker_compose_file: "{{ project_path }}/docker-compose.prod.yml"

# Nginx config name
nginx_site_name: "hairiq"

# Services list (used in loops)
services:
  - name: backend
  - name: ai
  - name: landing
  - name: admin
