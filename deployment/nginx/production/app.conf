# ─── HairIQ Production Nginx Configuration ────────────────────────────
# Replace {{DOMAIN}} with your actual domain before deploying.
# Certbot will auto-add SSL blocks after initial setup.

# Landing Page (Next.js)
server {
    listen 80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:3000;
    }
}

# Backend API (Django REST Framework)
server {
    listen 80;
    server_name api.{{DOMAIN}};
    client_max_body_size 100M;

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8000;
        limit_req zone=api_limit burst=20 nodelay;
    }

    location /static/ {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8000;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8000;
        proxy_cache_valid 200 30m;
        expires 30m;
    }
}

# AI Service (FastAPI — Hair Analysis)
server {
    listen 80;
    server_name ai.{{DOMAIN}};
    client_max_body_size 20M;

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8001;
        limit_req zone=ai_limit burst=5 nodelay;

        # Extended timeout for AI image analysis
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# Admin Dashboard (Next.js)
server {
    listen 80;
    server_name admin.{{DOMAIN}};

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:3001;
    }
}
