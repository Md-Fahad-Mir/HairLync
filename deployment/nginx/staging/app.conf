# ─── HairIQ Staging Nginx Configuration ───────────────────────────────
# Same structure as production but for staging.{{DOMAIN}} subdomains.

server {
    listen 80;
    server_name staging.{{DOMAIN}} www.staging.{{DOMAIN}};

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:3000;
    }
}

server {
    listen 80;
    server_name api.staging.{{DOMAIN}};
    client_max_body_size 100M;

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8000;
        limit_req zone=api_limit burst=20 nodelay;
    }
}

server {
    listen 80;
    server_name ai.staging.{{DOMAIN}};
    client_max_body_size 20M;

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:8001;
        limit_req zone=ai_limit burst=5 nodelay;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 80;
    server_name admin.staging.{{DOMAIN}};

    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://localhost:3001;
    }
}
