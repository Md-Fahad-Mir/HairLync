# ─── Staging Compose ──────────────────────────────────────────────────
# Usage: docker compose -f ../docker-compose.base.yml -f docker-compose.yml up -d
#
# Uses staging-tagged images. Mirrors production but with staging env.

services:
  ai:
    image: ${REGISTRY}/hairiq-ai:staging
    env_file:
      - ../environments/.env.staging.ai

  backend:
    image: ${REGISTRY}/hairiq-backend:staging
    env_file:
      - ../environments/.env.staging.backend

  landing:
    image: ${REGISTRY}/hairiq-landing:staging
    env_file:
      - ../environments/.env.staging.landing

  admin:
    image: ${REGISTRY}/hairiq-admin:staging
    env_file:
      - ../environments/.env.staging.admin
