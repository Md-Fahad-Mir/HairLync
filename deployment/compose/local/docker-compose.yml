# ─── Local Development Compose ────────────────────────────────────────
# Usage: docker compose -f ../docker-compose.base.yml -f docker-compose.yml up
#
# Builds from source with hot-reload volumes mounted.
#
# env_file entries are `required: false` (as in the production/staging
# overrides) so `docker compose ... config` validates even when the
# developer-created .env.local.* files are absent (e.g. on CI). Copy the
# deployment/environments/*.env.example templates to .env.local.<svc> for
# real local runs; their variables load normally when present.

services:
  ai:
    build:
      context: ../../services/ai
      dockerfile: Dockerfile
    env_file:
      - path: ../environments/.env.local.ai
        required: false
    volumes:
      - ../../services/ai:/app

  backend:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    env_file:
      - path: ../environments/.env.local.backend
        required: false
    volumes:
      - ../../services/backend:/app
    environment:
      DEBUG: "True"

  landing:
    build:
      context: ../../services/landing
      dockerfile: Dockerfile
    env_file:
      - path: ../environments/.env.local.landing
        required: false
    environment:
      NODE_ENV: development

  admin:
    build:
      context: ../../services/admin
      dockerfile: Dockerfile
      target: deps
    command: npm run dev
    env_file:
      - path: ../environments/.env.local.admin
        required: false
    volumes:
      - ../../services/admin:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
